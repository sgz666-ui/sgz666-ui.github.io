<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGZ的个人专属小站</title>
    <style>
        *{margin: 0;padding: 0;font-family: "微软雅黑",sans-serif;box-sizing: border-box;}
        body{background: linear-gradient(135deg,#667eea,#764ba2);min-height: 100vh;color:white;text-align:center;padding:60px 20px;}
        h1{font-size:2.8rem;margin-bottom:25px;text-shadow:0 2px 10px rgba(0,0,0,0.2);}
        .card{background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);padding:40px;border-radius:24px;width:100%;max-width:650px;margin:30px auto;box-shadow:0 8px 32px rgba(0,0,0,0.15);}
        .avatar{width:180px;height:180px;border-radius:50%;border:4px solid rgba(255,255,255,0.6);margin:0 auto 25px;object-fit:cover;}
        p{font-size:1.15rem;line-height:2;margin:12px 0;}
        .msg-box{margin-top:30px;padding-top:25px;border-top:1px solid rgba(255,255,255,0.2);}
        input,textarea{width:100%;padding:12px;border:none;border-radius:10px;margin:8px 0;background:rgba(255,255,255,0.15);color:white;outline:none;}
        button{padding:12px 30px;border:none;border-radius:10px;background:#fff;color:#667eea;font-weight:bold;margin-top:10px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ SGZ的个人博客</h1>
        <img src="https://picsum.photos/180/180" class="avatar">
        <p>🔒 正规HTTPS SSL加密安全站点</p>
        <p>🌐 IP溯源 | Ping检测 | 网站安全学习</p>
        <p>📅 永久免费 GitHub 合法静态个人网站</p>

        <div class="msg-box">
            <h3 style="margin-bottom:15px;">💬 访客留言板</h3>
            <input type="text" placeholder="你的昵称">
            <textarea rows="4" placeholder="写下你的留言~"></textarea>
            <button>提交留言</button>
        </div>
    </div>
</body>
</html>
