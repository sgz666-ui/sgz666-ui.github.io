<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGZ个人主页</title>
<script async src="https://count.getloli.com/get/@sgz666-ui?theme=moebooru"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:#fff;text-align:center;padding:50px 20px;transition:0.3s}
.dark{background:#121218;color:#eee}
.card{background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);border-radius:24px;padding:40px;max-width:700px;margin:30px auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.dark .card{background:rgba(0,0,0,0.25)}
.avatar{width:180px;height:180px;border-radius:50%;border:4px solid #fff6;margin:0 auto 25px}
h1{margin-bottom:15px}
.btn{padding:10px 20px;border:none;border-radius:12px;background:#fff;color:#667eea;font-weight:bold;margin:10px;cursor:pointer}
.dark .btn{background:#333;color:#fff}
input,textarea{width:100%;padding:12px;border-radius:10px;border:none;margin:8px 0;background:rgba(255,255,255,0.15);color:#fff}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:30px}
.gallery img{width:100%;border-radius:10px}
.music{margin:20px 0}
.count{margin:15px 0;font-size:16px}
.section{margin-top:40px;padding-top:30px;border-top:1px solid rgba(255,255,255,0.2)}
</style>
</head>
<body>
<div class="card">
<h1>✨ SGZ 个人专属网站</h1>
<img src="https://picsum.photos/180/180" class="avatar">

<p>永久免费 · 合法静态个人主页 · SSL安全加密</p>
<div class="count">访客总次数：<script src="https://count.getloli.com/get/@sgz666-ui"></script></div>

<button class="btn" onclick="document.body.classList.toggle('dark')">🌙 切换暗黑模式</button>

<div class="section">
<h3>🎵 背景音乐播放器</h3>
<audio class="music" controls loop>
<source src="https://freetestdata.com/wp-content/uploads/2021/09/Free_Test_Data_100KB_MP3.mp3">

</div>

<div class="section">
<h3>💬 在线留言板</h3>
<input placeholder="你的昵称">
<textarea rows="4" placeholder="写下留言~"></textarea>
<button class="btn">提交留言</button>
</div>

<div class="section">
<h3>🖼️ 我的相册</h3>
<div class="gallery">
<img src="https://picsum.photos/300/200?1">
<img src="https://picsum.photos/300/200?2">
<img src="https://picsum.photos/300/200?3">
<img src="https://picsum.photos/300/200?4">
<img src="https://picsum.photos/300/200?5">
<img src="https://picsum.photos/300/200?6">
</div>
</div>
</div>
</body>
</html>
